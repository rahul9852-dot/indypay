<!DOCTYPE html>
<html>
<head>
    <title>Payment Response</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .response-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;

            margin-bottom: 10px;

        <h2>Payment Response</h2>
        <div class="response-item">
