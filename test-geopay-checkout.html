<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test GeoPay Checkout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <h1>Test GeoPay Checkout</h1>
    <form id="testForm">
        <div class="form-group">
            <label>Order ID:</label>
            <input type="text" id="orderId" value="GeoPay12345" required>
        </div>
        <div class="form-group">
            <label>Amount (₹):</label>
            <input type="number" id="amount" value="100" min="100" max="50000" required>
        </div>
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name" value="Rahul" required>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" value="rahul@rupeeflow.co" required>
        </div>
        <div class="form-group">
            <label>Mobile:</label>
            <input type="tel" id="mobile" value="9123184896" required>
        </div>
        <button type="submit">Proceed to Checkout</button>
    </form>

    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const payload = {
                orderId: document.getElementById('orderId').value,
                amount: parseInt(document.getElementById('amount').value),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                mobile: document.getElementById('mobile').value
            };

            try {
                const response = await fetch('http://localhost:4000/api/v1/payments/payin/geopay/checkout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + btoa('key_01KCBSR4PY7TJRVRCJYZWDV0B7:sc_01KCBSR4PYFDZNYXJ3K9XXX22P')
                    },
                    body: JSON.stringify(payload)
                });

                const html = await response.text();

                // Open the response in a new window/tab
                const newWindow = window.open();
                newWindow.document.write(html);
                newWindow.document.close();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
